<div class="app-shell" style="display:flex; flex-direction:column; min-height:100vh; background:var(--bg);">

  <!-- ── Top Navigation ─────────────────────────────────────── -->
  <nav
    class="flex justify-between items-center px-4 md:px-7 h-[60px] bg-[#0d0d0d]/95 backdrop-blur-md border-b border-white/10 sticky top-0 z-[100]">
    <!-- Logo -->
    <div class="flex items-center gap-2.5">
      <div
        class="w-[34px] h-[34px] rounded-full bg-[#1ed760] flex items-center justify-center text-base shadow-[0_0_15px_rgba(30,215,96,0.3)]">
        🎵</div>
      <span class="text-xl font-extrabold tracking-tight text-white">spotifyhehe</span>
    </div>

    <!-- Desktop Nav Links -->
    <div class="hidden md:flex gap-2">
      <a routerLink="/"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 no-underline transition-all duration-200 hover:bg-white/5 hover:text-white active:bg-white/10">🏠
        Home</a>
      <a routerLink="/search"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 no-underline transition-all duration-200 hover:bg-white/5 hover:text-white active:bg-white/10">🔍
        Search</a>
      <a routerLink="/import"
        class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 no-underline transition-all duration-200 hover:bg-white/5 hover:text-white active:bg-white/10">📥
        Import</a>
    </div>

    <!-- Desktop Auth Button -->
    <div class="hidden md:block">
      <button *ngIf="!(isAuthenticated$ | async)" (click)="login()"
        class="px-5 py-2.5 bg-[#1ed760] text-black border-none rounded-lg text-[13px] font-bold cursor-pointer transition-all duration-200 tracking-wide hover:bg-[#1fdf64] hover:scale-[1.02] active:scale-[0.98]">Login
        with Spotify</button>
      <button *ngIf="isAuthenticated$ | async" (click)="logout()"
        class="px-5 py-2.5 bg-transparent text-gray-400 border border-white/20 rounded-lg text-[13px] font-bold cursor-pointer transition-all duration-200 hover:border-white hover:text-white active:scale-[0.98]">Logout</button>
    </div>

    <!-- Mobile Hamburger Button -->
    <button
      class="md:hidden flex items-center justify-center p-2 text-gray-400 hover:text-white focus:outline-none transition-colors"
      (click)="toggleMobileMenu()">
      <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </nav>

  <!-- Mobile Menu Dropdown -->
  <div *ngIf="isMobileMenuOpen"
    class="md:hidden flex flex-col items-center bg-[#121212] border-b border-white/10 px-4 py-4 space-y-2 absolute w-full z-[99] shadow-2xl">
    <a routerLink="/" (click)="toggleMobileMenu()"
      class="w-full text-center px-4 py-3 rounded-lg text-base font-semibold text-gray-300 transition-all duration-200 active:bg-white/10">🏠
      Home</a>
    <a routerLink="/search" (click)="toggleMobileMenu()"
      class="w-full text-center px-4 py-3 rounded-lg text-base font-semibold text-gray-300 transition-all duration-200 active:bg-white/10">🔍
      Search</a>
    <a routerLink="/import" (click)="toggleMobileMenu()"
      class="w-full text-center px-4 py-3 rounded-lg text-base font-semibold text-gray-300 transition-all duration-200 active:bg-white/10">📥
      Import</a>

    <div class="w-full pt-4 mt-2 border-t border-white/10 flex justify-center">
      <button *ngIf="!(isAuthenticated$ | async)" (click)="login(); toggleMobileMenu()"
        class="w-full px-5 py-3.5 bg-[#1ed760] text-black border-none rounded-full text-sm font-bold cursor-pointer transition-all duration-200 active:scale-[0.98]">Login
        with Spotify</button>
      <button *ngIf="isAuthenticated$ | async" (click)="logout(); toggleMobileMenu()"
        class="w-full px-5 py-3.5 bg-transparent text-white border border-white/30 rounded-full text-sm font-bold cursor-pointer transition-all duration-200 active:bg-white/10">Logout</button>
    </div>
  </div>

  <!-- ── Page Content ────────────────────────────────────────── -->
  <main style="flex:1; overflow-y:auto;">
    <router-outlet></router-outlet>
  </main>

  <!-- ── Global Player ───────────────────────────────────────── -->
  <app-player></app-player>
</div>
