services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: spotifyhehe-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false          # Set this in the Render dashboard
      - key: YOUTUBE_API_KEY
        sync: false          # Set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false          # Set to your frontend Render URL e.g. https://spotifyhehe.onrender.com
      - key: REDIS_HOST
        value: ""            # Leave empty if not using Redis on free tier
      - key: REDIS_PASSWORD
        value: ""
      - key: CACHE_TTL
        value: "86400"
    healthCheckPath: /api/health

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: spotifyhehe-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build:prod
    staticPublishPath: ./frontend/dist/spotify-clone
    pullRequestPreviewsEnabled: false
    routes:
      # API proxy → backend
      - type: rewrite
        source: /api/*
        destination: https://spotifyhehe-backend.onrender.com/api/:splat
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=2592000, immutable
      - path: "/*.js"
        name: Cache-Control
        value: public, max-age=2592000, immutable
      - path: "/*.css"
        name: Cache-Control
        value: public, max-age=2592000, immutable
